<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coat Admin | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #2c2f33; --card: #23272a; --blurple: #5865F2; --green: #43b581; --red: #f04747; --grey: #99aab5; --darker: #18191c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        
        /* Navigation Top Bar */
        .top-nav { background: var(--darker); display: flex; align-items: center; padding: 0 20px; height: 60px; border-bottom: 2px solid var(--blurple); position: sticky; top: 0; z-index: 100; }
        .nav-item { padding: 0 20px; cursor: pointer; height: 100%; display: flex; align-items: center; color: var(--grey); transition: 0.2s; border-bottom: 3px solid transparent; }
        .nav-item:hover { color: white; background: #2f3136; }
        .nav-item.active { color: white; border-bottom: 3px solid var(--blurple); background: #2f3136; }

        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Cards & UI */
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .user-info { margin-left: auto; font-size: 0.9rem; display: flex; align-items: center; gap: 15px; }
        
        /* Forms */
        .admin-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #2f3136; padding: 20px; border-radius: 8px; }
        input, select { background: #40444b; color: white; border: 1px solid #4f545c; padding: 10px; border-radius: 5px; outline: none; }
        input:focus { border-color: var(--blurple); }
        .btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-green { background: var(--green); }
        .btn-blurple { background: var(--blurple); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #40444b; }
        th { color: var(--grey); font-size: 0.75rem; text-transform: uppercase; }
        .edit-input { width: 90%; background: #40444b; color: white; border: 1px solid var(--blurple); padding: 4px; }
    </style>
</head>
<body>

<div id="authSection" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
    <h2>Coat System Login</h2>
    <button class="btn btn-blurple" style="width: 100%; padding: 15px;" onclick="login()">Log In with Discord</button>
</div>

<div id="mainUI" class="hidden">
    <div class="top-nav">
        <div class="nav-item active" onclick="switchTab('users', this)">Users</div>
        <div class="nav-item" onclick="switchTab('ranks', this)">Ranks</div>
        <div class="nav-item" onclick="switchTab('settings', this)">Settings</div>
        <div id="adminTab" class="nav-item hidden" onclick="switchTab('admin', this)">Admin Tools</div>
        
        <div class="user-info">
            <span id="status">📡 Syncing...</span>
            <strong id="userName">User</strong>
            <button onclick="logout()" style="color:var(--red); background:none; border:none; cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <label>Current Division: </label>
            <select id="divSelect" onchange="loadDivision(this.value)">
                <option value="">-- Loading --</option>
            </select>
        </div>

        <div id="tab-users" class="tab-content">
            <div class="card">
                <h3>Division Users</h3>
                <table id="tableUsers">
                    <thead><tr><th>Discord ID</th><th>EXP</th><th>Rank</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="tab-ranks" class="tab-content hidden">
            <div class="card">
                <h3>Rank Structure</h3>
                <table id="tableRanks">
                    <thead><tr><th>Rank</th><th>Exp</th><th>Roblox ID</th><th>Discord ID</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="tab-settings" class="tab-content hidden">
            <div class="card">
                <h3>System Settings</h3>
                <table id="tableSettings">
                    <thead><tr><th>Key</th><th>Value</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="tab-admin" class="tab-content hidden">
            <div class="card">
                <h3>Add New Division</h3>
                <div class="admin-form">
                    <input id="newDivName" placeholder="Division Name">
                    <input id="newDivGuild" type="number" placeholder="Discord Guild ID">
                    <input id="newDivRoblox" type="number" placeholder="Roblox Group ID">
                    <button class="btn btn-green" onclick="submitNewDivision()">Create Division</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
    let supabaseClient;
    let currentUser;
    const SUPERUSER_ID = "708656021001732107"; // Hardcoded for frontend checks

    window.onload = async () => {
        supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);
        
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) initDashboard(session.user);
        });

        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) initDashboard(session.user);

        supabaseClient.channel('db_sync').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'bot_responses', filter: 'id=eq.1' 
        }, payload => handleBotData(payload.new.data)).subscribe();
    };

    function initDashboard(user) {
        currentUser = user;
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('mainUI').classList.remove('hidden');
        document.getElementById('userName').innerText = user.user_metadata.full_name;

        // Show Admin Tab if Superuser
        const dId = user.app_metadata.provider_id || user.user_metadata.provider_id;
        if (dId === SUPERUSER_ID) document.getElementById('adminTab').classList.remove('hidden');

        requestDivs();
    }

    function switchTab(tabName, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.remove('hidden');
        el.classList.add('active');
    }

    async function login() {
        await supabaseClient.auth.signInWithOAuth({ provider: 'discord', options: { scopes: 'identify guilds', redirectTo: window.location.origin + window.location.pathname } });
    }

    async function logout() { await supabaseClient.auth.signOut(); window.location.reload(); }

    async function requestDivs() {
        const dId = currentUser.app_metadata.provider_id || currentUser.user_metadata.provider_id;
        await supabaseClient.from('commands').insert([{ message: JSON.stringify({ command: "GET_AUTHORIZED_DATA", discord_id: dId }), status: 'pending' }]);
    }

    async function loadDivision(id) {
        if(!id) return;
        await supabaseClient.from('commands').insert([{ message: JSON.stringify({ command: "GET_DIVISION_DATA", data: { division_id: id } }), status: 'pending' }]);
    }

    async function submitNewDivision() {
        const name = document.getElementById('newDivName').value;
        const guild = document.getElementById('newDivGuild').value;
        const roblox = document.getElementById('newDivRoblox').value;
        const dId = currentUser.app_metadata.provider_id || currentUser.user_metadata.provider_id;

        await supabaseClient.from('commands').insert([{ 
            message: JSON.stringify({ command: "ADD_DIVISION", discord_id: dId, data: { name, guild_id: guild, roblox_id: roblox } }), 
            status: 'pending' 
        }]);
        alert("Request Sent!");
    }

    function handleBotData(data) {
        if (data.type === "DIV_LIST") {
            const sel = document.getElementById('divSelect');
            sel.innerHTML = '<option value="">-- Select Division --</option>' + data.divisions.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
            document.getElementById('status').innerText = "🟢 Divisions Loaded";
        }
        if (data.type === "DIV_DATA") {
            // Render Users
            document.querySelector("#tableUsers tbody").innerHTML = data.users.map(u => `<tr><td>${u.discord_id}</td><td onclick="makeEdit(this,'users','exp',${u.id})">${u.exp} ✏️</td><td>${u.rank}</td></tr>`).join('');
            // Render Ranks
            document.querySelector("#tableRanks tbody").innerHTML = data.ranks.map(r => `<tr><td>${r.rank}</td><td onclick="makeEdit(this,'ranks','exp',${r.id})">${r.exp} ✏️</td><td onclick="makeEdit(this,'ranks','roblox_role_id',${r.id})">${r.roblox_role_id}</td><td onclick="makeEdit(this,'ranks','discord_role_id',${r.id})">${r.discord_role_id}</td></tr>`).join('');
            // Render Settings
            document.querySelector("#tableSettings tbody").innerHTML = data.settings.map(s => `<tr><td>${s.setting}</td><td onclick="makeEdit(this,'settings','value',${s.id})">${s.value} ✏️</td></tr>`).join('');
            document.getElementById('status').innerText = "🟢 Sync Active";
        }
    }

    function makeEdit(cell, table, col, id) {
        if (cell.querySelector('input')) return;
        const old = cell.innerText.replace('✏️', '').trim();
        cell.innerHTML = `<input class="edit-input" value="${old}" onkeydown="if(event.key==='Enter') save(this,'${table}','${col}',${id})">`;
        cell.querySelector('input').focus();
    }

    async function save(input, table, col, id) {
        await supabaseClient.from('commands').insert([{ message: JSON.stringify({ command: "UPDATE_VALUE", data: { table, column: col, id, newValue: input.value } }), status: 'pending' }]);
        document.getElementById('status').innerText = "💾 Saving...";
    }
</script>
</body>
</html>
