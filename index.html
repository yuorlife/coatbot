<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #2c2f33; color: white; margin: 0; }
        .container { background: #23272a; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; }
        input { padding: 12px; border-radius: 5px; border: none; width: 250px; margin-bottom: 15px; display: block; }
        button { padding: 10px 20px; background: #5865F2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #4752c4; }
        #status { margin-top: 15px; font-size: 0.9em; color: #99aab5; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Send to Bot</h2>
        <input type="text" id="messageInput" placeholder="Enter message...">
        <button id="sendBtn" onclick="sendToBot()">Send Message</button>
        <p id="status">System starting...</p>
    </div>

    <script src="config.js"></script>

    <script>
        let supabaseClient;

        // Initialize after a tiny delay to ensure config.js is loaded
        window.onload = () => {
            const statusLabel = document.getElementById('status');
            try {
                if (!window.ENV_URL || !window.ENV_KEY) {
                    throw new Error("Configuration missing. Check GitHub Secrets.");
                }
                supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);
                statusLabel.innerText = "System Ready.";
            } catch (err) {
                console.error(err);
                statusLabel.innerText = "Error: Configuration not found.";
            }
        };

        async function sendToBot() {
            if (!supabaseClient) return alert("System not ready!");

            const msgInput = document.getElementById('messageInput');
            const statusLabel = document.getElementById('status');
            const message = msgInput.value.trim();

            if (!message) return;

            statusLabel.innerText = "Sending...";
            
            try {
                const { error } = await supabaseClient
                    .from('commands')
                    .insert([{ message: message, status: 'pending' }]);

                if (error) throw error;

                statusLabel.innerText = "Sent! Bot will process it.";
                msgInput.value = "";
            } catch (err) {
                statusLabel.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
