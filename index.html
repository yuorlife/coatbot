<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coat Bot Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #2c2f33; --card: #23272a; --blurple: #5865F2; --green: #43b581; --grey: #99aab5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #2f3136; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #40444b; }
        th { background: #202225; color: var(--grey); font-size: 0.8rem; text-transform: uppercase; }
        
        /* The Pencil Icon */
        .edit-icon { cursor: pointer; margin-left: 8px; color: var(--grey); font-size: 0.9em; opacity: 0.5; transition: 0.2s; }
        td:hover .edit-icon { opacity: 1; color: var(--blurple); }
        
        .edit-input { background: #40444b; color: white; border: 1px solid var(--blurple); border-radius: 3px; padding: 4px; width: 80%; }
        #status { font-style: italic; color: var(--grey); margin-bottom: 10px; }
        h3 { border-left: 4px solid var(--blurple); padding-left: 10px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Coat Database Control</h2>
    <div id="status">Connecting...</div>

    <h3>Divisions</h3>
    <table id="tableDivs">
        <thead><tr><th>ID</th><th>Name</th><th>Guild ID</th><th>Roblox ID</th></tr></thead>
        <tbody></tbody>
    </table>

    <h3>Users</h3>
    <table id="tableUsers">
        <thead><tr><th>ID</th><th>Discord ID</th><th>EXP</th><th>Rank</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script src="config.js"></script>
<script>
    let supabaseClient;

    window.onload = () => {
        supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);
        
        supabaseClient.channel('db_sync').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'bot_responses', filter: 'id=eq.1' 
        }, payload => {
            renderUI(payload.new.data);
            document.getElementById('status').innerText = "Update synced!";
        }).subscribe();

        requestSync();
    };

    async function requestSync() {
        await supabaseClient.from('commands').insert([{ message: JSON.stringify({command: "GET_DB_VIEW"}), status: 'pending' }]);
    }

    function renderUI(data) {
        document.getElementById('status').innerText = "Data loaded.";
        
        // Render Divisions
        const divBody = document.querySelector("#tableDivs tbody");
        divBody.innerHTML = data.divisions.map(d => `
            <tr>
                <td>${d.id}</td>
                <td onclick="makeEditable(this, 'divisions', 'name', ${d.id})">${d.name} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this, 'divisions', 'guild_id', ${d.id})">${d.guild_id} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this, 'divisions', 'roblox_id', ${d.id})">${d.roblox_id} <span class="edit-icon">✏️</span></td>
            </tr>
        `).join('');

        // Render Users (Example columns)
        const userBody = document.querySelector("#tableUsers tbody");
        userBody.innerHTML = data.users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td onclick="makeEditable(this, 'users', 'discord_id', ${u.id})">${u.discord_id} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this, 'users', 'exp', ${u.id})">${u.exp} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this, 'users', 'rank', ${u.id})">${u.rank} <span class="edit-icon">✏️</span></td>
            </tr>
        `).join('');
    }

    function makeEditable(cell, table, column, id) {
        if (cell.querySelector('input')) return; // Already editing

        const originalValue = cell.innerText.replace('✏️', '').trim();
        cell.innerHTML = `<input type="text" class="edit-input" value="${originalValue}" onkeydown="handleKey(event, this, '${table}', '${column}', ${id})">`;
        cell.querySelector('input').focus();
    }

    async function handleKey(event, input, table, column, id) {
        if (event.key === 'Enter') {
            const newValue = input.value;
            document.getElementById('status').innerText = "Saving...";
            
            const payload = {
                command: "UPDATE_VALUE",
                data: { table, column, id, newValue }
            };

            await supabaseClient.from('commands').insert([{ message: JSON.stringify(payload), status: 'pending' }]);
            
            // Note: The cell will update automatically via the Realtime listener 
            // once the bot processes the change.
        } else if (event.key === 'Escape') {
            requestSync(); // Re-render to cancel
        }
    }
</script>
</body>
</html>
