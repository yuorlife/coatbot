<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --discord-blue: #5865F2;
            --discord-dark: #2c2f33;
            --discord-grey: #99aab5;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--discord-dark); 
            color: white; 
        }
        .container {
            background: #23272a;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h2 { margin-bottom: 1.5rem; }
        input { 
            padding: 12px; 
            border-radius: 4px; 
            border: 1px solid #23272a; 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 1rem; 
            background: #40444b;
            color: white;
        }
        button { 
            padding: 12px 24px; 
            background: var(--discord-blue); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: #4752c4; }
        button:disabled { background: #3c4270; cursor: not-allowed; }
        #status { 
            margin-top: 1rem; 
            font-size: 0.85rem; 
            color: var(--discord-grey); 
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Bot Command Center</h2>
        <input type="text" id="messageInput" placeholder="Type a message for Discord...">
        <button id="sendBtn" onclick="sendToBot()">Send Message</button>
        <p id="status">Ready to send.</p>
    </div>

    <script>
        // Placeholders for GitHub Actions to replace
        const SUPABASE_URL = 'VITE_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'VITE_SUPABASE_ANON_KEY';

        // Initialize Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function sendToBot() {
            const msgInput = document.getElementById('messageInput');
            const statusLabel = document.getElementById('status');
            const sendBtn = document.getElementById('sendBtn');
            
            const message = msgInput.value.trim();

            if (!message) {
                alert("Please enter a message!");
                return;
            }

            // UI Feedback
            statusLabel.innerText = "Sending to mailbox...";
            statusLabel.style.color = "#99aab5";
            sendBtn.disabled = true;

            try {
                // Insert into your 'commands' table
                const { error } = await supabaseClient
                    .from('commands')
                    .insert([{ 
                        message: message, 
                        status: 'pending' 
                    }]);

                if (error) throw error;

                // Success
                statusLabel.innerText = "Sent! The bot will process it shortly.";
                statusLabel.style.color = "#43b581"; // Discord Green
                msgInput.value = ""; 
            } catch (err) {
                console.error("Supabase Error:", err);
                statusLabel.innerText = "Error: " + err.message;
                statusLabel.style.color = "#f04747"; // Discord Red
            } finally {
                sendBtn.disabled = false;
            }
        }

        // Global exposure for the HTML onclick
        window.sendToBot = sendToBot;
    </script>
</body>
</html>
