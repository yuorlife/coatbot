<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Database Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #2c2f33;
            --card: #23272a;
            --blurple: #5865F2;
            --green: #43b581;
            --grey: #99aab5;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); width: 90%; max-width: 800px; text-align: center; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 20px; background: var(--blurple); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #4752c4; }
        button:disabled { background: #3c4270; cursor: not-allowed; }
        .refresh-btn { background: var(--green); }
        .refresh-btn:hover { background: #3ca374; }
        #status { font-size: 0.9em; color: var(--grey); margin-bottom: 10px; }
        #dbView { background: #1a1c1e; padding: 15px; border-radius: 5px; text-align: left; overflow-x: auto; max-height: 400px; border: 1px solid #40444b; }
        pre { margin: 0; font-family: 'Consolas', monospace; font-size: 13px; color: #e1e1e1; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Bot Database Portal</h2>
        
        <div id="status">Connecting to Supabase...</div>

        <div class="controls">
            <button id="requestBtn" onclick="requestDatabase()">📥 Fetch Database from Bot</button>
        </div>

        <div id="dbView">
            <pre id="jsonOutput">// Click the button to request data...</pre>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        let supabaseClient;

        window.onload = () => {
            if (!window.ENV_URL || !window.ENV_KEY) {
                document.getElementById('status').innerText = "Error: Config missing!";
                return;
            }

            // 1. Initialize Supabase
            supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);
            document.getElementById('status').innerText = "System Ready. Waiting for user...";

            // 2. Setup Realtime Listener
            // This waits for the Bot to update row ID 1 in 'bot_responses'
            supabaseClient
                .channel('db_sync')
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'bot_responses',
                    filter: 'id=eq.1' 
                }, payload => {
                    console.log('Update received from Bot!');
                    displayData(payload.new.data);
                    document.getElementById('status').innerText = "Database synchronized!";
                    document.getElementById('requestBtn').disabled = false;
                })
                .subscribe();
        };

        async function requestDatabase() {
            const btn = document.getElementById('requestBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerText = "Command sent! Waiting for Bot to upload file...";

            const payload = { command: "GET_DB_VIEW", timestamp: new Date().toISOString() };

            try {
                const { error } = await supabaseClient
                    .from('commands')
                    .insert([{ 
                        message: JSON.stringify(payload), 
                        status: 'pending' 
                    }]);

                if (error) throw error;
            } catch (err) {
                alert("Request failed: " + err.message);
                btn.disabled = false;
            }
        }

        function displayData(data) {
            const output = document.getElementById('jsonOutput');
            output.innerText = JSON.stringify(data, null, 4);
        }
    </script>
</body>
</html>
