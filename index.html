<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coat Admin Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #2c2f33; --card: #23272a; --blurple: #5865F2; --green: #43b581; --red: #f04747; --grey: #99aab5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 20px; border-radius: 12px; }
        
        /* Table & UI */
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #2f3136; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #40444b; }
        th { background: #202225; color: var(--grey); font-size: 0.75rem; text-transform: uppercase; }
        .edit-icon { cursor: pointer; margin-left: 8px; opacity: 0.3; }
        .btn-plus { background: var(--green); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 20px; }
        .btn-del { background: none; border: none; cursor: pointer; filter: grayscale(1); }
        .btn-del:hover { filter: grayscale(0); transform: scale(1.2); }
        
        /* Modal Styling */
        #modalOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: var(--card); padding: 25px; border-radius: 12px; width: 350px; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 1px solid var(--blurple); }
        .modal input { width: 100%; padding: 10px; margin: 10px 0; background: #40444b; border: none; color: white; border-radius: 4px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        #status { font-size: 0.8rem; color: var(--grey); background: #202225; padding: 5px 15px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">Add Entry</h3>
        <div id="modalInputs"></div>
        <div class="modal-btns">
            <button onclick="closeModal()" style="background: var(--grey);">Cancel</button>
            <button onclick="submitModal()" style="background: var(--green); color: white;">Confirm</button>
        </div>
    </div>
</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Coat Database</h2>
        <div id="status">Connecting...</div>
    </div>

    <div style="display: flex; align-items: center; gap: 10px; margin-top: 20px;">
        <h3>Divisions</h3>
        <button class="btn-plus" onclick="openModal('division')">+</button>
    </div>
    <table id="tableDivs">
        <thead><tr><th>ID</th><th>Name</th><th>Guild</th><th>Roblox</th><th></th></tr></thead>
        <tbody></tbody>
    </table>

    <div style="display: flex; align-items: center; gap: 10px;">
        <h3>Users</h3>
        <button class="btn-plus" onclick="openModal('user')">+</button>
    </div>
    <table id="tableUsers">
        <thead><tr><th>ID</th><th>Discord ID</th><th>EXP</th><th>Rank</th><th></th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script src="config.js"></script>
<script>
    let supabaseClient;
    let currentModalType = '';

    // --- 1. THE RENDERING ENGINE ---
    function renderUI(data) {
        if (!data) return;
        const status = document.getElementById('status');
        
        // Render Divisions Table
        const divBody = document.querySelector("#tableDivs tbody");
        if (divBody && data.divisions) {
            divBody.innerHTML = data.divisions.map(d => `
                <tr>
                    <td>${d.id}</td>
                    <td onclick="makeEditable(this, 'divisions', 'name', ${d.id})">${d.name} <span class="edit-icon">✏️</span></td>
                    <td onclick="makeEditable(this, 'divisions', 'guild_id', ${d.id})">${d.guild_id} <span class="edit-icon">✏️</span></td>
                    <td onclick="makeEditable(this, 'divisions', 'roblox_id', ${d.id})">${d.roblox_id} <span class="edit-icon">✏️</span></td>
                    <td><button class="btn-del" onclick="deleteRow('divisions', ${d.id})">🗑️</button></td>
                </tr>
            `).join('');
        }

        // Render Users Table
        const userBody = document.querySelector("#tableUsers tbody");
        if (userBody && data.users) {
            userBody.innerHTML = data.users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td onclick="makeEditable(this, 'users', 'discord_id', ${u.id})">${u.discord_id} <span class="edit-icon">✏️</span></td>
                    <td onclick="makeEditable(this, 'users', 'exp', ${u.id})">${u.exp} <span class="edit-icon">✏️</span></td>
                    <td onclick="makeEditable(this, 'users', 'rank', ${u.id})">${u.rank} <span class="edit-icon">✏️</span></td>
                    <td><button class="btn-del" onclick="deleteRow('users', ${u.id})">🗑️</button></td>
                </tr>
            `).join('');
        }
        status.innerText = "🟢 System Active";
    }

    // --- 2. MODAL (POP-UP) LOGIC ---
    function openModal(type) {
        currentModalType = type;
        const container = document.getElementById('modalInputs');
        const title = document.getElementById('modalTitle');
        container.innerHTML = '';
        
        if(type === 'division') {
            title.innerText = "New Division";
            container.innerHTML = `
                <input id="m_name" placeholder="Division Name">
                <input id="m_guild" type="number" placeholder="Guild ID">
                <input id="m_roblox" type="number" placeholder="Roblox ID">`;
        } else {
            title.innerText = "New User";
            container.innerHTML = `
                <input id="m_discord" placeholder="Discord ID">
                <input id="m_div" type="number" placeholder="Division ID">
                <input id="m_rank" placeholder="Rank">`;
        }
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { 
        document.getElementById('modalOverlay').style.display = 'none'; 
    }

    async function submitModal() {
        const status = document.getElementById('status');
        let payload = { command: currentModalType === 'division' ? 'ADD_DIVISION' : 'ADD_USER', data: {} };
        
        if(currentModalType === 'division') {
            payload.data = { 
                name: document.getElementById('m_name').value, 
                guild_id: document.getElementById('m_guild').value, 
                roblox_id: document.getElementById('m_roblox').value 
            };
        } else {
            payload.data = { 
                discord_id: document.getElementById('m_discord').value, 
                division_id: document.getElementById('m_div').value, 
                rank: document.getElementById('m_rank').value, 
                exp: 0 
            };
        }

        status.innerText = "💾 Sending Add Command...";
        await supabaseClient.from('commands').insert([{ message: JSON.stringify(payload), status: 'pending' }]);
        closeModal();
    }

    // --- 3. INLINE EDITING & DELETE ---
    function makeEditable(cell, table, column, id) {
        if (cell.querySelector('input')) return;
        const val = cell.innerText.replace('✏️', '').trim();
        cell.innerHTML = `<input style="width:90%; background:#40444b; color:white; border:1px solid var(--blurple);" value="${val}" onkeydown="if(event.key==='Enter') saveEdit(this,'${table}','${column}',${id})">`;
        cell.querySelector('input').focus();
    }

    async function saveEdit(input, table, column, id) {
        document.getElementById('status').innerText = "💾 Saving Changes...";
        const payload = { command: "UPDATE_VALUE", data: { table, column, id, newValue: input.value } };
        await supabaseClient.from('commands').insert([{ message: JSON.stringify(payload), status: 'pending' }]);
    }

    async function deleteRow(table, id) {
        if(!confirm(`Delete ID ${id} from ${table}?`)) return;
        document.getElementById('status').innerText = "🗑️ Deleting...";
        const payload = { command: "DELETE_ROW", data: { table, id } };
        await supabaseClient.from('commands').insert([{ message: JSON.stringify(payload), status: 'pending' }]);
    }

    // --- 4. INITIALIZATION & REALTIME ---
    async function requestSync() {
        if (!supabaseClient) return;
        document.getElementById('status').innerText = "⏳ Requesting Sync...";
        await supabaseClient.from('commands').insert([{ 
            message: JSON.stringify({command: "GET_DB_VIEW"}), 
            status: 'pending' 
        }]);
    }

    window.onload = async () => {
        const status = document.getElementById('status');
        if (!window.ENV_URL || !window.ENV_KEY) {
            status.innerText = "❌ Config Error: Check GitHub Secrets";
            return;
        }

        supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);
        status.innerText = "🔌 Connecting...";

        const channel = supabaseClient
            .channel('db_sync')
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'bot_responses', 
                filter: 'id=eq.1' 
            }, payload => {
                console.log('✅ Update received:', payload.new.data);
                renderUI(payload.new.data);
            })
            .subscribe((subStatus) => {
                if (subStatus === 'SUBSCRIBED') {
                    console.log("📡 Realtime Active.");
                    requestSync(); 
                }
            });
    };
</script>
</body>
</html>
