<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coat Bot Admin Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #2c2f33; --card: #23272a; --blurple: #5865F2; --green: #43b581; --red: #f04747; --grey: #99aab5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #2f3136; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #40444b; }
        th { background: #202225; color: var(--grey); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Header Actions */
        .header-flex { display: flex; align-items: center; gap: 15px; margin-top: 30px; margin-bottom: 10px; }
        .btn-plus { background: var(--green); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-plus:hover { transform: scale(1.1); filter: brightness(1.1); }
        
        /* Inline Actions */
        .edit-icon { cursor: pointer; margin-left: 8px; color: var(--grey); font-size: 0.8em; opacity: 0.3; }
        td:hover .edit-icon { opacity: 1; color: var(--blurple); }
        .btn-del { background: none; border: none; cursor: pointer; color: var(--grey); font-size: 1.1em; transition: 0.2s; }
        .btn-del:hover { color: var(--red); transform: scale(1.2); }
        
        .edit-input { background: #40444b; color: white; border: 1px solid var(--blurple); border-radius: 3px; padding: 4px; width: 90%; }
        #status { font-size: 0.85rem; color: var(--grey); background: #202225; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Coat Management System</h2>
        <div id="status">📡 Connecting...</div>
    </div>

    <div class="header-flex">
        <h3 style="margin:0">Divisions</h3>
        <button class="btn-plus" onclick="createNew('ADD_DIVISION')" title="Add Division">+</button>
    </div>
    <table id="tableDivs">
        <thead><tr><th>ID</th><th>Name</th><th>Guild ID</th><th>Roblox ID</th><th style="width:40px"></th></tr></thead>
        <tbody></tbody>
    </table>

    <div class="header-flex">
        <h3 style="margin:0">Users</h3>
        <button class="btn-plus" onclick="createNew('ADD_USER')" title="Add User">+</button>
    </div>
    <table id="tableUsers">
        <thead><tr><th>ID</th><th>Discord ID</th><th>EXP</th><th>Rank</th><th style="width:40px"></th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script src="config.js"></script>
<script>
    let supabaseClient;

    window.onload = () => {
        supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);
        
        supabaseClient.channel('db_sync').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'bot_responses', filter: 'id=eq.1' 
        }, payload => {
            renderUI(payload.new.data);
            document.getElementById('status').innerText = "🟢 Database In Sync";
        }).subscribe();

        requestSync();
    };

    async function requestSync() {
        await supabaseClient.from('commands').insert([{ message: JSON.stringify({command: "GET_DB_VIEW"}), status: 'pending' }]);
    }

    async function createNew(command) {
        document.getElementById('status').innerText = "⏳ Adding new record...";
        // Note: For divisions, the bot adds a placeholder. For users, it adds a recruit.
        await supabaseClient.from('commands').insert([{ 
            message: JSON.stringify({
                command: command, 
                data: { name: "New Division", guild_id: 0, roblox_id: 0 } // Default for ADD_DIVISION
            }), 
            status: 'pending' 
        }]);
    }

    async function deleteRow(table, id) {
        if (!confirm(`Are you sure you want to delete ID ${id} from ${table}?`)) return;
        document.getElementById('status').innerText = "🗑️ Deleting...";
        await supabaseClient.from('commands').insert([{ 
            message: JSON.stringify({command: "DELETE_ROW", data: { table, id }}), 
            status: 'pending' 
        }]);
    }

    function renderUI(data) {
        // DIVISIONS
        const divBody = document.querySelector("#tableDivs tbody");
        divBody.innerHTML = data.divisions.map(d => `
            <tr>
                <td>${d.id}</td>
                <td onclick="makeEditable(this, 'divisions', 'name', ${d.id})">${d.name} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this, 'divisions', 'guild_id', ${d.id})">${d.guild_id} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this, 'divisions', 'roblox_id', ${d.id})">${d.roblox_id} <span class="edit-icon">✏️</span></td>
                <td><button class="btn-del" onclick="deleteRow('divisions', ${d.id})">🗑️</button></td>
            </tr>
        `).join('');

        // USERS
        const userBody = document.querySelector("#tableUsers tbody");
        userBody.innerHTML = data.users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td onclick="makeEditable(this, 'users', 'discord_id', ${u.id})">${u.discord_id} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this, 'users', 'exp', ${u.id})">${u.exp} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this, 'users', 'rank', ${u.id})">${u.rank} <span class="edit-icon">✏️</span></td>
                <td><button class="btn-del" onclick="deleteRow('users', ${u.id})">🗑️</button></td>
            </tr>
        `).join('');
    }

    // --- SHARED EDIT LOGIC ---
    function makeEditable(cell, table, column, id) {
        if (cell.querySelector('input')) return;
        const originalValue = cell.innerText.replace('✏️', '').trim();
        cell.innerHTML = `<input type="text" class="edit-input" value="${originalValue}" onkeydown="handleKey(event, this, '${table}', '${column}', ${id})">`;
        cell.querySelector('input').focus();
    }

    async function handleKey(event, input, table, column, id) {
        if (event.key === 'Enter') {
            const newValue = input.value;
            document.getElementById('status').innerText = "💾 Saving changes...";
            await supabaseClient.from('commands').insert([{ 
                message: JSON.stringify({command: "UPDATE_VALUE", data: { table, column, id, newValue }}), 
                status: 'pending' 
            }]);
        } else if (event.key === 'Escape') { requestSync(); }
    }
</script>
</body>
</html>
