<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coat Bot Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #2c2f33;
            --card: #23272a;
            --blurple: #5865F2;
            --green: #43b581;
            --grey: #99aab5;
            --white: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--white); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 90%; max-width: 600px; }
        
        h2, h3 { text-align: center; margin-top: 0; }
        #status { text-align: center; font-size: 0.85rem; color: var(--grey); margin-bottom: 20px; font-style: italic; }

        /* Form Styling */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: #2f3136; padding: 15px; border-radius: 8px; }
        input { padding: 12px; border-radius: 4px; border: 1px solid #202225; background: #40444b; color: white; outline: none; }
        input:focus { border-color: var(--blurple); }
        
        .btn-add { padding: 12px; background: var(--green); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { background: #3ca374; }
        
        .btn-fetch { width: 100%; padding: 10px; background: var(--blurple); color: white; border: none; border-radius: 4px; margin-bottom: 20px; cursor: pointer; font-weight: bold; }

        /* Table Styling */
        #dbContainer { background: #1a1c1e; border-radius: 6px; padding: 10px; min-height: 100px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--grey); font-size: 0.8rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #40444b; }
        td { padding: 12px 10px; border-bottom: 1px solid #2f3136; font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        .empty-msg { text-align: center; color: var(--grey); padding: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Coat Bot Interface</h2>
        <div id="status">Connecting...</div>

        <div class="input-group">
            <h3>➕ Add New Division</h3>
            <input type="text" id="divName" placeholder="Division Name (e.g. Alpha)">
            <input type="text" id="divLeader" placeholder="Leader Name (e.g. JohnDoe)">
            <button class="btn-add" id="addBtn" onclick="addDivision()">Add to Database</button>
        </div>

        <button class="btn-fetch" onclick="requestDatabase()">🔄 Refresh List</button>

        <div id="dbContainer">
            <table>
                <thead>
                    <tr>
                        <th>Division</th>
                        <th>Leader</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="2" class="empty-msg">No data loaded yet.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        let supabaseClient;

        window.onload = () => {
            if (!window.ENV_URL || !window.ENV_KEY) {
                document.getElementById('status').innerText = "Config Error: Check GitHub Secrets.";
                return;
            }

            supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);
            document.getElementById('status').innerText = "Connected to Supabase.";

            // REALTIME: Listen for bot updates
            supabaseClient
                .channel('db_sync')
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'bot_responses',
                    filter: 'id=eq.1' 
                }, payload => {
                    renderTable(payload.new.data.divisions);
                    document.getElementById('status').innerText = "Database updated!";
                })
                .subscribe();

            // Initial fetch
            requestDatabase();
        };

        async function requestDatabase() {
            document.getElementById('status').innerText = "Syncing with Bot...";
            const payload = { command: "GET_DB_VIEW" };
            await sendCommand(payload);
        }

        async function addDivision() {
            const name = document.getElementById('divName').value.trim();
            const leader = document.getElementById('divLeader').value.trim();

            if (!name || !leader) return alert("Please fill in both fields!");

            const payload = {
                command: "ADD_DIVISION",
                data: { name: name, leader: leader }
            };

            document.getElementById('status').innerText = "Sending add request...";
            await sendCommand(payload);

            // Clear inputs
            document.getElementById('divName').value = '';
            document.getElementById('divLeader').value = '';
        }

        async function sendCommand(payload) {
            const { error } = await supabaseClient
                .from('commands')
                .insert([{ 
                    message: JSON.stringify(payload), 
                    status: 'pending' 
                }]);

            if (error) {
                console.error(error);
                alert("Error sending command: " + error.message);
            }
        }

        function renderTable(divisions) {
            const tbody = document.getElementById('tableBody');
            if (!divisions || divisions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="empty-msg">No divisions found.</td></tr>';
                return;
            }

            tbody.innerHTML = divisions.map(div => `
                <tr>
                    <td>${div.name || '---'}</td>
                    <td>${div.leader || '---'}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
