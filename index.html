<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coat Admin | Division Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #2c2f33; --card: #23272a; --blurple: #5865F2; --green: #43b581; --red: #f04747; --grey: #99aab5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; }
        
        /* Sections */
        .hidden { display: none !important; }
        .auth-card { text-align: center; padding: 60px 20px; border: 2px dashed var(--blurple); border-radius: 12px; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: #18191c; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; }
        
        /* Select Styling */
        .selector-box { background: #2f3136; padding: 20px; border-radius: 8px; margin-bottom: 25px; border-left: 4px solid var(--blurple); }
        select { padding: 10px; border-radius: 4px; background: #40444b; color: white; border: 1px solid var(--grey); width: 250px; cursor: pointer; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; background: #2f3136; border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #40444b; }
        th { background: #18191c; color: var(--grey); font-size: 0.75rem; text-transform: uppercase; }
        .edit-input { background: #40444b; color: white; border: 1px solid var(--blurple); padding: 4px; border-radius: 3px; width: 80%; }
        .edit-icon { cursor: pointer; opacity: 0.4; font-size: 0.8em; }

        #loginBtn { background: var(--blurple); color: white; border: none; padding: 15px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #status { font-size: 0.85rem; color: var(--grey); }
    </style>
</head>
<body>

<div class="container">
    <div id="authSection" class="auth-card">
        <h2>Coat Bot Management</h2>
        <p>Access your divisions and ranks by logging in with Discord.</p>
        <button id="loginBtn" onclick="login()">Log In with Discord</button>
    </div>

    <div id="mainUI" class="hidden">
        <div class="user-bar">
            <div>
                <strong id="userName">User</strong> 
                <span id="status" style="margin-left: 15px;">📡 Initializing...</span>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:var(--red); cursor:pointer; font-weight:bold;">Logout</button>
        </div>

        <div id="selectorSection" class="selector-box">
            <h3 style="margin-top:0">Manage Division</h3>
            <p style="font-size: 0.9rem; color: var(--grey);">Select a server where you have Administrator permissions:</p>
            <select id="divSelect" onchange="loadDivision(this.value)">
                <option value="">-- Loading Divisions --</option>
            </select>
        </div>

        <div id="contentTables" class="hidden">
            <h3>Division Users</h3>
            <table id="tableUsers">
                <thead><tr><th>Discord ID</th><th>EXP</th><th>Rank</th></tr></thead>
                <tbody></tbody>
            </table>

            <h3>Rank Requirements</h3>
            <table id="tableRanks">
                <thead><tr><th>Rank Name</th><th>Min EXP</th><th>Permissions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
    let supabaseClient;
    let currentUser;

    window.onload = async () => {
        if (!window.ENV_URL || !window.ENV_KEY) return;
        supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);

        // Listen for Auth Changes (detects the redirect token)
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) setupUI(session.user);
        });

        // Check for existing session
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) setupUI(session.user);

        // Realtime Listener
        supabaseClient.channel('db_sync').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'bot_responses', filter: 'id=eq.1' 
        }, payload => {
            renderData(payload.new.data);
        }).subscribe();
    };

    async function login() {
        await supabaseClient.auth.signInWithOAuth({
            provider: 'discord',
            options: {
                scopes: 'identify email guilds',
                redirectTo: window.location.origin + window.location.pathname
            }
        });
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    function setupUI(user) {
        currentUser = user;
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('mainUI').classList.remove('hidden');
        document.getElementById('userName').innerText = user.user_metadata.full_name;
        
        // Request the list of divisions this user is an admin in
        requestAuthorizedDivs();
    }

    async function requestAuthorizedDivs() {
        const discordId = currentUser.app_metadata.provider_id || currentUser.user_metadata.provider_id;
        document.getElementById('status').innerText = "⏳ Checking Admin Status...";
        await supabaseClient.from('commands').insert([{ 
            message: JSON.stringify({ command: "GET_AUTHORIZED_DATA", discord_id: discordId }), 
            status: 'pending' 
        }]);
    }

    async function loadDivision(divId) {
        if (!divId) return;
        document.getElementById('status').innerText = "⏳ Loading Data...";
        await supabaseClient.from('commands').insert([{ 
            message: JSON.stringify({ command: "GET_DIVISION_DATA", data: { division_id: divId } }), 
            status: 'pending' 
        }]);
    }

    function renderData(data) {
        const status = document.getElementById('status');

        // Case 1: Populate the Dropdown
        if (data.type === "DIV_LIST") {
            const select = document.getElementById('divSelect');
            if (data.divisions.length === 0) {
                status.innerText = "❌ No Admin Access Found";
                select.innerHTML = '<option>No Divisions Found</option>';
            } else {
                select.innerHTML = '<option value="">-- Choose a Division --</option>' + 
                    data.divisions.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
                status.innerText = "🟢 Ready";
            }
        }

        // Case 2: Populate the Tables
        if (data.type === "DIV_DATA") {
            document.getElementById('contentTables').classList.remove('hidden');
            
            document.querySelector("#tableUsers tbody").innerHTML = (data.users || []).map(u => `
                <tr>
                    <td>${u.discord_id}</td>
                    <td onclick="makeEditable(this,'users','exp',${u.id})">${u.exp} <span class="edit-icon">✏️</span></td>
                    <td onclick="makeEditable(this,'users','rank',${u.id})">${u.rank} <span class="edit-icon">✏️</span></td>
                </tr>
            `).join('');

            document.querySelector("#tableRanks tbody").innerHTML = (data.ranks || []).map(r => `
                <tr>
                    <td onclick="makeEditable(this,'ranks','rank',${r.id})">${r.rank} <span class="edit-icon">✏️</span></td>
                    <td onclick="makeEditable(this,'ranks','exp',${r.id})">${r.exp} <span class="edit-icon">✏️</span></td>
                    <td>${r.officer ? '👮 Officer' : ''} ${r.leader ? '👑 Leader' : ''}</td>
                </tr>
            `).join('');
            
            status.innerText = "🟢 Editing Mode Active";
        }
    }

    function makeEditable(cell, table, column, id) {
        if (cell.querySelector('input')) return;
        const val = cell.innerText.replace('✏️', '').trim();
        cell.innerHTML = `<input class="edit-input" value="${val}" onkeydown="if(event.key==='Enter') saveEdit(this,'${table}','${column}',${id})">`;
        cell.querySelector('input').focus();
    }

    async function saveEdit(input, table, column, id) {
        document.getElementById('status').innerText = "💾 Saving...";
        await supabaseClient.from('commands').insert([{ 
            message: JSON.stringify({ command: "UPDATE_VALUE", data: { table, column, id, newValue: input.value } }), 
            status: 'pending' 
        }]);
    }
</script>
</body>
</html>
