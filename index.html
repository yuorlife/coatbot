<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coat Bot Database Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #2c2f33; --card: #23272a; --blurple: #5865F2; --green: #43b581; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; }
        .section { background: #2f3136; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { padding: 10px; margin: 5px; border-radius: 4px; border: none; background: #40444b; color: white; width: 180px; }
        button { padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; background: var(--blurple); color: white; }
        .btn-add { background: var(--green); width: 100%; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #40444b; }
        th { color: #99aab5; text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Coat Bot Data Management</h2>
    <p id="status" style="color: #99aab5;">Connecting...</p>

    <div class="section">
        <h3>➕ Add Division</h3>
        <input type="text" id="divName" placeholder="Name">
        <input type="number" id="divGuild" placeholder="Guild ID">
        <input type="number" id="divRoblox" placeholder="Roblox ID">
        <button class="btn-add" onclick="addDivision()">Insert into SQLite</button>
    </div>

    <h3>Divisions</h3>
    <table id="tableDivs"><thead><tr><th>ID</th><th>Name</th><th>Guild</th><th>Roblox</th></tr></thead><tbody></tbody></table>

    <h3>Users</h3>
    <table id="tableUsers"><thead><tr><th>Discord ID</th><th>Div ID</th><th>EXP</th><th>Rank</th><th>Leader?</th></tr></thead><tbody></tbody></table>
    
    <h3>Settings</h3>
    <table id="tableSettings"><thead><tr><th>Div ID</th><th>Setting</th><th>Value</th></tr></thead><tbody></tbody></table>
</div>

<script src="config.js"></script>
<script>
    let supabaseClient;

    window.onload = () => {
        supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);
        
        // Realtime Listener
        supabaseClient.channel('db_sync').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'bot_responses', filter: 'id=eq.1' 
        }, payload => {
            updateUI(payload.new.data);
            document.getElementById('status').innerText = "Database Synced.";
        }).subscribe();

        requestSync();
    };

    async function requestSync() {
        document.getElementById('status').innerText = "Requesting data...";
        await supabaseClient.from('commands').insert([{ message: JSON.stringify({command: "GET_DB_VIEW"}), status: 'pending' }]);
    }

    async function addDivision() {
        const payload = {
            command: "ADD_DIVISION",
            data: {
                name: document.getElementById('divName').value,
                guild_id: document.getElementById('divGuild').value,
                roblox_id: document.getElementById('divRoblox').value
            }
        };
        await supabaseClient.from('commands').insert([{ message: JSON.stringify(payload), status: 'pending' }]);
        document.getElementById('status').innerText = "Add request sent!";
    }

    function updateUI(data) {
        // Render Divisions
        document.querySelector("#tableDivs tbody").innerHTML = data.divisions.map(d => 
            `<tr><td>${d.id}</td><td>${d.name}</td><td>${d.guild_id}</td><td>${d.roblox_id}</td></tr>`).join('');
        
        // Render Users
        document.querySelector("#tableUsers tbody").innerHTML = data.users.map(u => 
            `<tr><td>${u.discord_id}</td><td>${u.division_id}</td><td>${u.exp}</td><td>${u.rank}</td><td>${u.leader ? '✅' : '❌'}</td></tr>`).join('');

        // Render Settings
        document.querySelector("#tableSettings tbody").innerHTML = data.settings.map(s => 
            `<tr><td>${s.division_id}</td><td>${s.setting}</td><td>${s.value}</td></tr>`).join('');
    }
</script>
</body>
</html>
