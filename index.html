<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coat Bot | Division Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #2c2f33; --card: #23272a; --blurple: #5865F2; --green: #43b581; --red: #f04747; --grey: #99aab5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Auth Section */
        .auth-card { text-align: center; padding: 40px; border: 2px dashed var(--blurple); border-radius: 12px; margin-bottom: 20px; }
        #loginBtn { background: var(--blurple); color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #loginBtn:hover { filter: brightness(1.1); }
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: #202225; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; }

        /* Tables */
        .table-section { display: none; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; background: #2f3136; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #40444b; }
        th { background: #18191c; color: var(--grey); font-size: 0.75rem; text-transform: uppercase; }
        
        .edit-icon { cursor: pointer; margin-left: 5px; opacity: 0.4; font-size: 0.8em; }
        .edit-input { background: #40444b; color: white; border: 1px solid var(--blurple); padding: 4px; border-radius: 3px; width: 80%; }
        
        #status { font-size: 0.85rem; color: var(--grey); }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-officer { background: var(--blurple); }
        .badge-leader { background: var(--green); }
    </style>
</head>
<body>

<div class="container">
    <div id="authSection" class="auth-card">
        <h2>Welcome to Coat Bot</h2>
        <p>Please log in with Discord to manage your divisions.</p>
        <button id="loginBtn" onclick="login()">Log In with Discord</button>
    </div>

    <div id="mainHeader" class="user-bar" style="display: none;">
        <div>
            <span id="welcomeText">Welcome, Admin</span>
            <span id="status">📡 Connecting...</span>
        </div>
        <button onclick="logout()" style="background:none; border:none; color:var(--red); cursor:pointer;">Logout</button>
    </div>

    <div id="contentSection" class="table-section">
        
        <h3>Division Users</h3>
        <table id="tableUsers">
            <thead><tr><th>Discord ID</th><th>EXP</th><th>Rank</th></tr></thead>
            <tbody></tbody>
        </table>

        <h3>Rank Requirements & Status</h3>
        <table id="tableRanks">
            <thead><tr><th>Rank Name</th><th>Required EXP</th><th>Status</th></tr></thead>
            <tbody></tbody>
        </table>

    </div>
</div>

<script src="config.js"></script>
<script>
    let supabaseClient;
    let currentUser;

    window.onload = async () => {
        supabaseClient = supabase.createClient(window.ENV_URL, window.ENV_KEY);

        // 1. IMPORTANT: This "catches" the login from the URL redirect
        const { data: { session }, error } = await supabaseClient.auth.getSession();

        if (session) {
            setupAuthenticatedSession(session.user);
        } else {
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('status').innerText = "Please log in.";
        }
        // Setup Realtime
        supabaseClient.channel('db_sync').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'bot_responses', filter: 'id=eq.1' 
        }, payload => {
            renderUI(payload.new.data);
        }).subscribe();
    };

    async function login() {
        // Get the current URL of the page (e.g., your GitHub Pages link)
        const currentUrl = window.location.origin + window.location.pathname;

        const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'discord',
            options: {
                scopes: 'identify email guilds',
                redirectTo: currentUrl // Forces Supabase to send you back HERE
            }
        });

        if (error) console.error("Login error:", error.message);
    }
    

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    function setupAuthenticatedSession(user) {
        currentUser = user;
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainHeader').style.display = 'flex';
        document.getElementById('contentSection').style.display = 'block';
        document.getElementById('welcomeText').innerText = `Admin: ${user.user_metadata.full_name}`;
        
        requestAuthorizedData();
    }

    async function requestAuthorizedData() {
        document.getElementById('status').innerText = "⏳ Verifying Permissions...";
        // Use the provider_id (the actual Discord ID)
        const discordId = currentUser.app_metadata.provider_id || currentUser.user_metadata.provider_id;
        
        await supabaseClient.from('commands').insert([{ 
            message: JSON.stringify({ command: "GET_AUTHORIZED_DATA", discord_id: discordId }), 
            status: 'pending' 
        }]);
    }

    function renderUI(data) {
        if (data.error) {
            document.getElementById('status').innerText = "❌ " + data.error;
            return;
        }

        // Render Users
        const userBody = document.querySelector("#tableUsers tbody");
        userBody.innerHTML = data.users.map(u => `
            <tr>
                <td>${u.discord_id}</td>
                <td onclick="makeEditable(this,'users','exp',${u.id})">${u.exp} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this,'users','rank',${u.id})">${u.rank} <span class="edit-icon">✏️</span></td>
            </tr>
        `).join('');

        // Render Ranks
        const rankBody = document.querySelector("#tableRanks tbody");
        rankBody.innerHTML = data.ranks.map(r => `
            <tr>
                <td onclick="makeEditable(this,'ranks','rank',${r.id})">${r.rank} <span class="edit-icon">✏️</span></td>
                <td onclick="makeEditable(this,'ranks','exp',${r.id})">${r.exp} <span class="edit-icon">✏️</span></td>
                <td>
                    ${r.officer ? '<span class="badge badge-officer">OFFICER</span>' : ''}
                    ${r.leader ? '<span class="badge badge-leader">LEADER</span>' : ''}
                </td>
            </tr>
        `).join('');

        document.getElementById('status').innerText = "🟢 Data Synced";
    }

    function makeEditable(cell, table, column, id) {
        if (cell.querySelector('input')) return;
        const val = cell.innerText.replace('✏️', '').trim();
        cell.innerHTML = `<input class="edit-input" value="${val}" onkeydown="if(event.key==='Enter') saveEdit(this,'${table}','${column}',${id})">`;
        cell.querySelector('input').focus();
    }

    async function saveEdit(input, table, column, id) {
        document.getElementById('status').innerText = "💾 Saving...";
        await supabaseClient.from('commands').insert([{ 
            message: JSON.stringify({
                command: "UPDATE_VALUE", 
                data: { table, column, id, newValue: input.value },
                discord_id: currentUser.app_metadata.provider_id 
            }), 
            status: 'pending' 
        }]);
    }
</script>
</body>
</html>
