name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Change to "master" if your repo uses master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Config File
        run: |
          echo "window.ENV_URL = '${{ secrets.SUPABASE_URL }}';" > config.js
          echo "window.ENV_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';" >> config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages